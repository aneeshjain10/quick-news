<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>BharatTimes Pro - Intelligence & News Dashboard</title>
    <style>
      :root { --primary: #0056b3; --accent: #d32f2f; --bg: #f8f9fa; }
      body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #1a1a1a; transition: all 0.3s ease; }
      
      /* Smooth Scrolling & Transitions */
      html { scroll-behavior: smooth; }
      .transition-card { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease; }
      .transition-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

      /* Live Stock Ticker Animation */
      .ticker-wrap { width: 100%; overflow: hidden; background: #111; color: #fff; padding: 8px 0; border-bottom: 2px solid var(--accent); }
      .ticker { display: inline-block; white-space: nowrap; animation: ticker 40s linear infinite; }
      .ticker-item { display: inline-block; padding: 0 30px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
      @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

      .hero-main { height: 550px; border-radius: 16px; overflow: hidden; position: relative; }
      .navbar { border-bottom: 1px solid #dee2e6; backdrop-filter: blur(10px); background: rgba(255,255,255,0.95) !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
